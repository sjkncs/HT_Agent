# ============================================================
# 喜茶智能客服 Agent — 后端配置
# ============================================================

server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: heytea-agent

  # ── MySQL ──
  datasource:
    url: jdbc:mysql://localhost:3306/heytea_agent?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000

  # ── Redis ──
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8

  # ── Multipart Upload ──
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
      enabled: true

  # ── Jackson ──
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # ── SQL Init ──
  sql:
    init:
      mode: never
      schema-locations: classpath:db/schema.sql
      continue-on-error: true

# ── MyBatis-Plus ──
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.heytea.agent.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ── JWT ──
jwt:
  secret: ${JWT_SECRET:heytea-agent-secret-key-change-in-production-2024}
  expiration: 86400000  # 24 hours

# ── LLM — xixixixi Gateway (Qwen3.7-MAX) ──
llm:
  provider: dashscope
  api-key: sk-o7BuqZPyiYSm7CD2L5arfVdFvdM4JR5foObVnWWmOIoFgsVv
  model: Qwen3.7-MAX
  max-tokens: 2048
  temperature: 0.7
  base-url: https://api.xixixixi.cloud/v1

# ── MemOS Cloud ──
memos:
  enabled: true
  base-url: https://memos.memtensor.cn/api/openmem/v1
  api-key: ${MEMOS_API_KEY:mpg-B8vt02G3gwlMsZ6sJ4u8yTJalxdHD6os9+Ep5dLP}
  user-id: heytea-user

# ── Tavily Web Search ──
tavily:
  api-key: ${TAVILY_API_KEY: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}
  base-url: https://api.tavily.com

# ── File Upload ──
upload:
